# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - the-48-low-of-power

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Create and Start virtual environment and Install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt
                
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F55E9D09D1914845A1B702E20B36C886 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_EBE32C2664864831A852418E25916AAE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C3B2600BCC8D4378B3D1920FFFA2B074 }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'the-48-low-of-power'
          slot-name: 'Production'

      # 🔄 NEW AUTOMATION STEP: Sync the App Service outbound IPs to the VM's Network Security Group
      - name: 'Sync App Service IPs to Postgres NSG'
        uses: azure/CLI@v2
        with:
          inlineScript: |
            echo "Fetching all potential outbound IPs for the-48-low-of-power..."
            
            # 1. Fetch the outbound IP addresses array from Azure
            IP_LIST=$(az webapp show --name the-48-low-of-power --resource-group the-48-low-of-power_group --query "possibleOutboundIpAddresses" -o tsv)
            
            echo "Updating NSG rule 'AllowPostgres5432' with fresh IPs..."
            
            # 2. Automatically overwrite the source address spaces in your NSG rule
            az network nsg rule update \
              --resource-group gold-e-learning_group \
              --nsg-name gold-e-learning-nsg \
              --name AllowPostgres5432 \
              --source-address-prefixes $IP_LIST
              
            echo "Firewall sync complete!"
